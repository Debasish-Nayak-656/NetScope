<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetScope — IP Lookup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #050a0e;
      --surface:  #0a1520;
      --border:   #0d3a52;
      --accent:   #00d4ff;
      --accent2:  #00ff9d;
      --warn:     #ff6b35;
      --text:     #c8e6f0;
      --muted:    #4a7a8a;
      --glow:     0 0 18px rgba(0,212,255,0.35);
      --glow2:    0 0 18px rgba(0,255,157,0.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── GRID BACKGROUND ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── SCANLINE ── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
    }

    .container {
      position: relative; z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.6s ease both;
    }
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 900;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-shadow: var(--glow);
    }
    .logo span { color: var(--accent2); text-shadow: var(--glow2); }
    .tagline {
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    /* ── SEARCH BOX ── */
    .search-wrap {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: var(--glow), inset 0 0 40px rgba(0,0,0,0.4);
      transition: border-color 0.2s;
      animation: fadeDown 0.6s 0.1s ease both;
    }
    .search-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 28px rgba(0,212,255,0.5), inset 0 0 40px rgba(0,0,0,0.4);
    }
    .search-prefix {
      background: var(--surface);
      padding: 0 16px;
      display: flex; align-items: center;
      color: var(--accent);
      font-size: 0.9rem;
      border-right: 1px solid var(--border);
      user-select: none;
    }
    #ipInput {
      flex: 1;
      background: var(--surface);
      border: none;
      outline: none;
      padding: 16px 20px;
      color: var(--accent2);
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.05rem;
      letter-spacing: 0.08em;
    }
    #ipInput::placeholder { color: var(--muted); }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      animation: fadeDown 0.6s 0.15s ease both;
    }
    .btn {
      flex: 1;
      padding: 13px 20px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.88rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .btn-primary {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,212,255,0.06);
    }
    .btn-primary:hover {
      background: rgba(0,212,255,0.15);
      box-shadow: var(--glow);
    }
    .btn-secondary:hover {
      border-color: var(--muted);
      background: rgba(255,255,255,0.04);
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── STATUS BAR ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      margin-top: 16px;
      border-radius: 4px;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      transition: all 0.3s;
      min-height: 42px;
      border: 1px solid transparent;
    }
    .status-bar.idle    { border-color: var(--border); background: var(--surface); color: var(--muted); }
    .status-bar.loading { border-color: var(--accent); background: rgba(0,212,255,0.06); color: var(--accent); }
    .status-bar.success { border-color: var(--accent2); background: rgba(0,255,157,0.05); color: var(--accent2); }
    .status-bar.error   { border-color: var(--warn); background: rgba(255,107,53,0.08); color: var(--warn); }
    .pulse { animation: pulse 1s infinite; }

    /* ── RESULT PANEL ── */
    #resultPanel {
      margin-top: 28px;
      display: none;
    }
    #resultPanel.visible { display: block; animation: fadeUp 0.4s ease; }

    .section-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .ip-hero {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 22px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      box-shadow: var(--glow);
      margin-bottom: 20px;
    }
    .ip-address {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: var(--accent);
      text-shadow: var(--glow);
    }
    .flag-badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge {
      padding: 4px 12px;
      border-radius: 2px;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid;
    }
    .badge-ok     { border-color: var(--accent2); color: var(--accent2); background: rgba(0,255,157,0.08); }
    .badge-warn   { border-color: var(--warn); color: var(--warn); background: rgba(255,107,53,0.1); }
    .badge-neutral{ border-color: var(--muted); color: var(--muted); }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px 22px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--accent); }
    .card-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.28em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .field { display: flex; justify-content: space-between; gap: 10px; padding: 5px 0; border-bottom: 1px solid rgba(13,58,82,0.5); }
    .field:last-child { border-bottom: none; }
    .field-key { color: var(--muted); font-size: 0.8rem; }
    .field-val { color: var(--text); font-size: 0.8rem; text-align: right; max-width: 60%; word-break: break-all; }
    .field-val.accent { color: var(--accent2); }

    /* ── MAP PLACEHOLDER ── */
    .map-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px 22px;
      margin-bottom: 16px;
    }
    .map-card .card-title { font-family: 'Orbitron', sans-serif; font-size: 0.6rem; letter-spacing: 0.28em; color: var(--accent); text-transform: uppercase; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .map-frame {
      width: 100%;
      height: 220px;
      border: none;
      border-radius: 2px;
      filter: invert(0.9) hue-rotate(180deg) saturate(0.7);
    }
    .coords {
      margin-top: 10px;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.1em;
    }
    .coords span { color: var(--accent2); }

    /* ── HISTORY ── */
    #historyPanel {
      margin-top: 36px;
      display: none;
    }
    #historyPanel.visible { display: block; animation: fadeUp 0.4s ease; }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s;
      gap: 12px;
    }
    .history-item:hover { border-color: var(--accent); background: rgba(0,212,255,0.04); }
    .history-ip { color: var(--accent); font-size: 0.9rem; }
    .history-meta { color: var(--muted); font-size: 0.75rem; text-align: right; }
    .history-loc { font-size: 0.78rem; color: var(--text); }

    .btn-clear {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 3px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .btn-clear:hover { border-color: var(--warn); color: var(--warn); }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── SPINNER ── */
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(0,212,255,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center;
      margin-top: 60px;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">NET<span>SCOPE</span></div>
    <div class="tagline">IP Address Intelligence &amp; Geolocation</div>
  </header>

  <!-- Search -->
  <div class="search-wrap">
    <div class="search-prefix">$ trace</div>
    <input id="ipInput" type="text" placeholder="Enter IP address (e.g. 8.8.8.8)" autocomplete="off" spellcheck="false" />
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="lookupBtn" onclick="lookup()">⟶ Lookup IP</button>
    <button class="btn btn-secondary" onclick="lookupSelf()">⊙ My IP</button>
    <button class="btn btn-secondary" onclick="clearAll()">✕ Clear</button>
  </div>

  <div class="status-bar idle" id="status">
    <span>Ready — Enter an IP address to begin.</span>
  </div>

  <!-- Result Panel -->
  <div id="resultPanel">
    <div class="ip-hero">
      <div>
        <div class="section-label">Target IP</div>
        <div class="ip-address" id="heroIP">—</div>
      </div>
      <div class="flag-badges" id="flagBadges"></div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">📍 Location</div>
        <div id="locFields"></div>
      </div>
      <div class="card">
        <div class="card-title">🌐 Network</div>
        <div id="netFields"></div>
      </div>
    </div>

    <div class="map-card">
      <div class="card-title">🗺️ Approximate Location</div>
      <iframe id="mapFrame" class="map-frame" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      <div class="coords" id="coords"></div>
    </div>
  </div>

  <!-- History Panel -->
  <div id="historyPanel">
    <div class="history-header">
      <div class="section-label" style="margin-bottom:0">Recent Lookups</div>
      <button class="btn-clear" onclick="clearHistory()">Clear History</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

  <footer>NETSCOPE v1.0 &nbsp;·&nbsp; POWERED BY ip-api.com &nbsp;·&nbsp; FOR ETHICAL USE ONLY</footer>

</div>

<script>
  const API_BASE = ''; // Same origin — backend serves this file

  // ── Status helpers ──────────────────────────────────────────────────────
  function setStatus(type, html) {
    const el = document.getElementById('status');
    el.className = `status-bar ${type}`;
    el.innerHTML = type === 'loading'
      ? `<div class="spinner"></div><span>${html}</span>`
      : `<span>${html}</span>`;
  }

  // ── Lookup ──────────────────────────────────────────────────────────────
  async function lookup(ip) {
    const input = ip || document.getElementById('ipInput').value.trim();
    if (!input) { setStatus('error', 'Please enter an IP address.'); return; }

    document.getElementById('ipInput').value = input;
    setStatus('loading', `Tracing ${input}...`);
    document.getElementById('lookupBtn').disabled = true;

    try {
      const res = await fetch(`${API_BASE}/api/lookup/${encodeURIComponent(input)}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Lookup failed');

      renderResult(data);
      saveHistory(input, data);
      setStatus('success', `✓ Trace complete — ${data.location.city || '?'}, ${data.location.country || '?'}`);
    } catch (e) {
      setStatus('error', `✗ ${e.message}`);
    } finally {
      document.getElementById('lookupBtn').disabled = false;
    }
  }

  async function lookupSelf() {
    setStatus('loading', 'Detecting your IP...');
    try {
      const res = await fetch(`${API_BASE}/api/myip`);
      const { ip } = await res.json();
      document.getElementById('ipInput').value = ip;
      lookup(ip);
    } catch {
      setStatus('error', 'Could not detect your IP.');
    }
  }

  // ── Render ──────────────────────────────────────────────────────────────
  function renderResult(data) {
    const panel = document.getElementById('resultPanel');
    panel.classList.remove('visible');
    void panel.offsetWidth; // reflow for re-animation
    panel.classList.add('visible');

    document.getElementById('heroIP').textContent = data.ip;

    // Badges
    const badges = document.getElementById('flagBadges');
    badges.innerHTML = '';
    const addBadge = (label, warn) =>
      badges.innerHTML += `<span class="badge ${warn ? 'badge-warn' : 'badge-ok'}">${label}</span>`;
    if (data.flags.proxy) addBadge('⚠ Proxy / VPN', true);
    if (data.flags.hosting) addBadge('⚠ Hosting / DC', true);
    if (data.flags.mobile) addBadge('📱 Mobile', false);
    if (!data.flags.proxy && !data.flags.hosting) addBadge('✓ Residential', false);

    // Location fields
    const loc = data.location;
    const locRows = [
      ['Country',   `${flag(loc.countryCode)} ${loc.country}`],
      ['Region',    loc.region],
      ['City',      loc.city || '—'],
      ['ZIP',       loc.zip || '—'],
      ['Timezone',  loc.timezone],
      ['Continent', loc.continent],
    ];
    document.getElementById('locFields').innerHTML = locRows.map(([k,v]) =>
      `<div class="field"><span class="field-key">${k}</span><span class="field-val accent">${v || '—'}</span></div>`
    ).join('');

    // Network fields
    const net = data.network;
    const netRows = [
      ['ISP',      net.isp],
      ['Org',      net.organization],
      ['AS',       net.as],
      ['AS Name',  net.asName],
      ['Hostname', net.hostname || '—'],
    ];
    document.getElementById('netFields').innerHTML = netRows.map(([k,v]) =>
      `<div class="field"><span class="field-key">${k}</span><span class="field-val">${v || '—'}</span></div>`
    ).join('');

    // Map
    const { latitude: lat, longitude: lng } = loc;
    document.getElementById('mapFrame').src =
      `https://www.openstreetmap.org/export/embed.html?bbox=${lng-1}%2C${lat-1}%2C${lng+1}%2C${lat+1}&layer=mapnik&marker=${lat}%2C${lng}`;
    document.getElementById('coords').innerHTML =
      `Lat: <span>${lat.toFixed(4)}</span>  ·  Lon: <span>${lng.toFixed(4)}</span>`;
  }

  function flag(code) {
    if (!code) return '';
    return code.toUpperCase().replace(/./g, c =>
      String.fromCodePoint(0x1F1E6 - 65 + c.charCodeAt(0))
    );
  }

  function clearAll() {
    document.getElementById('ipInput').value = '';
    document.getElementById('resultPanel').classList.remove('visible');
    setStatus('idle', 'Ready — Enter an IP address to begin.');
  }

  // ── History ──────────────────────────────────────────────────────────────
  async function saveHistory(ip, result) {
    try {
      await fetch(`${API_BASE}/api/history`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ip, result }),
      });
      loadHistory();
    } catch {}
  }

  async function loadHistory() {
    try {
      const res = await fetch(`${API_BASE}/api/history`);
      const data = await res.json();
      const panel = document.getElementById('historyPanel');
      const list = document.getElementById('historyList');
      if (!data.length) { panel.classList.remove('visible'); return; }
      panel.classList.add('visible');
      list.innerHTML = data.map(h => `
        <div class="history-item" onclick="lookup('${h.ip}')">
          <div>
            <div class="history-ip">${h.ip}</div>
            <div class="history-loc">${h.result?.location?.city || '?'}, ${h.result?.location?.country || '?'}</div>
          </div>
          <div class="history-meta">${new Date(h.timestamp).toLocaleTimeString()}</div>
        </div>
      `).join('');
    } catch {}
  }

  async function clearHistory() {
    await fetch(`${API_BASE}/api/history`, { method: 'DELETE' });
    document.getElementById('historyPanel').classList.remove('visible');
  }

  // ── Enter key ────────────────────────────────────────────────────────────
  document.getElementById('ipInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') lookup();
  });

  // Init
  loadHistory();
</script>
</body>
</html>
